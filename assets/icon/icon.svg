<?xml version="1.0" encoding="UTF-8"?>
<!-- Иконка приложения «Дыши»: точка-«я» в центре и три расходящихся
     кольца-ряби дыхания — наружу тоньше и бледнее, как затухающая волна.
     Вектор-исходник; Android adaptive icon и legacy/iOS-растры генерятся
     из этой же геометрии (tools/generate_launcher_icons.py). -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#164E63"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <g stroke="#FFFFFF" fill="none">
    <circle cx="256" cy="256" r="66" stroke-width="17" stroke-opacity="1"/>
    <circle cx="256" cy="256" r="106" stroke-width="14" stroke-opacity="0.59"/>
    <circle cx="256" cy="256" r="146" stroke-width="11" stroke-opacity="0.35"/>
  </g>
  <circle cx="256" cy="256" r="26" fill="#FFFFFF"/>
</svg>
